<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Panel — Strategic Analysis</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
    --accent: #58a6ff;
    --green: #3fb950;
    --green-dim: #238636;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
    --cyan: #39d2c0;
    --pink: #f778ba;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; color: var(--text-bright); font-weight: 600; }
  .header .subtitle { font-size: 13px; color: var(--text-dim); }
  .header .back { font-size: 13px; color: var(--accent); text-decoration: none; margin-left: auto; font-family: var(--mono); }
  .header .back:hover { text-decoration: underline; }

  .controls { padding: 12px 32px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .control-group { display: flex; align-items: center; gap: 8px; }
  .control-group label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .ctrl-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.1); color: var(--accent); }

  .main { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 100px); }

  .sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); }
  .sidebar-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; font-weight: 600; }
  .expert-card { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.15s; position: relative; }
  .expert-card:hover { background: var(--surface2); }
  .expert-card.active { background: var(--surface2); border-left: 3px solid var(--orange); }
  .expert-card.active .expert-name { color: var(--orange); }
  .expert-card.dimmed { opacity: 0.35; }
  .expert-name { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 2px; }
  .expert-domain { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
  .expert-badge { position: absolute; top: 12px; right: 12px; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-default { background: rgba(240,136,62,0.2); color: var(--orange); }
  .badge-auto { background: rgba(188,140,255,0.15); color: var(--purple); }
  .token-cost { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-top: 3px; }

  .content { overflow-y: auto; padding: 24px 32px; }
  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .card.full { grid-column: 1 / -1; }
  .card h3 { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card h3 .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: none; letter-spacing: 0; font-weight: 500; }
  .tag-comp { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag-grow { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-risk { background: rgba(248,81,73,0.15); color: var(--red); }
  .tag-comm { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tag-mode { background: rgba(240,136,62,0.15); color: var(--orange); }

  .body { font-size: 14px; line-height: 1.7; color: var(--text); }
  .body code { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 2px 6px; border-radius: 4px; color: var(--cyan); }
  .body pre { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 14px; border-radius: 6px; overflow-x: auto; margin: 10px 0; line-height: 1.6; border: 1px solid var(--border); white-space: pre-wrap; }
  .body ul { padding-left: 18px; }
  .body li { margin-bottom: 4px; }
  .body li::marker { color: var(--text-dim); }
  .hl { color: var(--accent); font-weight: 500; }
  .warn { color: var(--yellow); }
  .ok { color: var(--green); }
  .danger { color: var(--red); }
  .dim { color: var(--text-dim); }
  .purple { color: var(--purple); }
  .orange { color: var(--orange); }

  .quote { border-left: 3px solid var(--orange); padding: 12px 16px; background: rgba(240,136,62,0.05); border-radius: 0 6px 6px 0; margin: 10px 0; font-style: italic; color: var(--text-bright); font-size: 14px; line-height: 1.6; }
  .quote .attribution { font-style: normal; font-size: 12px; color: var(--text-dim); margin-top: 6px; }

  .diff-label { display: inline-block; font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 3px; margin-right: 4px; }
  .diff-no { background: rgba(248,81,73,0.1); color: var(--red); }
  .diff-yes { background: rgba(63,185,80,0.1); color: var(--green); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { max-height: 200px; }
    .content-grid { grid-template-columns: 1fr; }
    .card.full { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div><span style="font-size:24px;">📊</span></div>
  <div>
    <h1>/sc:business-panel — Strategic Business Analysis</h1>
    <div class="subtitle">AI-facilitated panel discussion between 9 renowned business thought leaders — analysis only, no implementation</div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <a class="back" href="pipeline-playground.html">&larr; Pipeline</a>
    <a class="back" href="spec-panel-playground.html" style="color:var(--accent);">👥 Spec Panel</a>
  </div>
</div>

<div class="controls" id="controls"></div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<script>
const EXPERTS = {
  'michael-porter': {
    name: 'Michael Porter', domain: 'Competitive Strategy', tokens: 300,
    methodology: 'Five Forces, value chain analysis, generic strategies (cost/differentiation/focus)',
    voice: "What is your competitive advantage, and is it sustainable? Where are the Five Forces pressuring you?",
    perspective: `Porter evaluates every business through structural industry analysis. Profitability isn't about working harder — it's about industry structure and positioning within it. He maps supplier power, buyer power, threat of substitutes, threat of new entrants, and competitive rivalry to assess whether a business can sustain margins.`,
    looksFor: ['Clear competitive positioning (cost leadership, differentiation, or focus)', 'Understanding of industry forces affecting profitability', 'Value chain analysis — where value is created and captured'],
    redFlags: ['"We compete on everything" (stuck in the middle)', 'No awareness of substitute products or new entrants', 'Competing on price without a structural cost advantage'],
    approves: ['Positioning is clear and defensible', 'Industry forces are analyzed and strategy addresses them', 'Value chain shows where competitive advantage is built'],
    modes: { discussion: '"Let\'s map the Five Forces for this market"', debate: '"Being cheaper isn\'t a strategy unless you have a structural cost advantage"', socratic: '"What would a new entrant need to do to take your market share?"' },
    focusAreas: ['competitive'], isDefault: true
  },
  'clayton-christensen': {
    name: 'Clayton Christensen', domain: 'Disruption & Innovation', tokens: 300,
    methodology: 'Disruption Theory, Jobs-to-be-Done framework',
    voice: "What job is the customer hiring this product to do? Is this sustaining or disruptive innovation?",
    perspective: `Christensen separates sustaining innovation (better-faster-cheaper for existing customers) from disruptive innovation (worse on traditional metrics but serving an overlooked market). He evaluates through Jobs-to-be-Done — customers don't buy products, they hire them to make progress in their lives.`,
    looksFor: ['Clear articulation of the "job" the customer is hiring the product for', 'Whether innovation is sustaining or disruptive (and appropriate strategy for each)', 'Market positioning relative to incumbents and overlooked segments'],
    redFlags: ['Trying to out-feature an incumbent on their own turf (sustaining trap)', 'No clarity on target customer\'s "job to be done"', 'Conflating product features with customer progress'],
    approves: ['The job-to-be-done is clearly articulated with evidence', 'Strategy matches the innovation type (sustaining vs. disruptive)', 'Market entry targets an overlooked or overserved segment'],
    modes: { discussion: '"Let\'s identify the job — what progress is the customer trying to make?"', debate: '"You\'re playing a sustaining game against an incumbent with more resources"', socratic: '"Who is NOT served by the current market leaders? Why?"' },
    focusAreas: ['competitive'], isDefault: true
  },
  'peter-drucker': {
    name: 'Peter Drucker', domain: 'Management & Effectiveness', tokens: 280,
    methodology: 'Management by Objectives (MBO), knowledge worker productivity, effectiveness principles',
    voice: "What is the purpose of this business? If you weren't already doing this, would you start it today?",
    perspective: `Drucker cuts through complexity with first-principles questions. He asks what business you're really in, who your customer actually is, and what they consider value. He challenges organizations to abandon what no longer works, focus on strengths, and measure what matters rather than what's easy to count.`,
    looksFor: ['Clear definition of purpose and customer', 'Focus on effectiveness (doing the right things) over efficiency (doing things right)', 'Measurable objectives tied to customer value'],
    redFlags: ['Activity without measurable outcomes', 'Optimizing processes that shouldn\'t exist', 'No clear answer to "who is our customer and what do they value?"'],
    approves: ['Purpose is clear and customer-centric', 'Objectives are measurable and prioritized', 'Resources are allocated to strengths, not propping up weaknesses'],
    modes: { discussion: '"What is the one thing this organization does that no one else can?"', debate: '"You\'re measuring activity, not results"', socratic: '"If you started fresh today, would you build this the same way?"' },
    focusAreas: ['growth'], isDefault: true
  },
  'seth-godin': {
    name: 'Seth Godin', domain: 'Marketing & Tribe Building', tokens: 280,
    methodology: 'Permission marketing, Purple Cow, tribe leadership, smallest viable audience',
    voice: "Is this remarkable enough that someone would tell a friend about it? Who is your smallest viable audience?",
    perspective: `Godin rejects mass marketing and average products. He looks for the "Purple Cow" — something remarkable enough to spread on its own. He pushes businesses toward their smallest viable audience rather than trying to please everyone.`,
    looksFor: ['A clearly defined smallest viable audience', 'Something remarkable — worth talking about', 'Permission-based relationship with customers (trust, not interruption)'],
    redFlags: ['"Our target market is everyone"', 'Unremarkable products competing on price alone', 'Interruption-based marketing strategy (ads-first, value-second)'],
    approves: ['Target audience is specific and passionate', 'Product has a "Purple Cow" — a reason to be talked about', 'Growth strategy relies on earning trust, not buying attention'],
    modes: { discussion: '"Who would miss this if it were gone? That\'s your tribe"', debate: '"Average products for average people is a race to the bottom"', socratic: '"Would your best customer recommend this to a friend? Why or why not?"' },
    focusAreas: ['growth']
  },
  'wckim-mauborgne': {
    name: 'Kim & Mauborgne', domain: 'Blue Ocean Strategy', tokens: 300,
    methodology: 'Blue Ocean Strategy, value innovation, strategy canvas, four actions framework',
    voice: "Are you competing in a red ocean or creating a blue one? What can you eliminate, reduce, raise, or create?",
    perspective: `Kim & Mauborgne challenge the assumption that you must compete in existing markets. They push businesses to create uncontested market space by simultaneously pursuing differentiation AND low cost. Their Four Actions Framework restructures industry assumptions rather than accepting them.`,
    looksFor: ['Opportunity to create uncontested market space', 'Four Actions analysis — what to eliminate, reduce, raise, create', 'Value innovation — breaking the cost-value trade-off'],
    redFlags: ['Head-to-head competition with established players on their terms', 'Accepting industry boundaries as given', 'Incremental improvements instead of strategic leaps'],
    approves: ['Strategy creates new demand rather than fighting over existing demand', 'Four Actions Framework applied — clear eliminate/reduce/raise/create choices', 'Value curve is visually distinct from competitors'],
    modes: { discussion: '"Let\'s draw the strategy canvas — how does your value curve differ?"', debate: '"You\'re competing in a red ocean — what would a blue ocean look like?"', socratic: '"What does your industry take for granted that could be eliminated?"' },
    focusAreas: ['competitive']
  },
  'jim-collins': {
    name: 'Jim Collins', domain: 'Organizational Excellence', tokens: 280,
    methodology: 'Good to Great, flywheel effect, Hedgehog Concept, Level 5 Leadership',
    voice: "What is your Hedgehog Concept — the intersection of passion, capability, and economic engine?",
    perspective: `Collins studies what separates great organizations from good ones. He looks for the Hedgehog Concept (intersection of what you're passionate about, what you can be best in the world at, and what drives your economic engine), the flywheel effect (consistent effort compounding over time), and disciplined people making disciplined decisions.`,
    looksFor: ['Hedgehog Concept clarity — passion, capability, and economic driver aligned', 'Flywheel mechanics — does each action compound into the next?', 'Disciplined culture — consistency over heroics'],
    redFlags: ['Chasing multiple opportunities without a unifying concept', 'Reliance on one-time events instead of compounding momentum', '"Fox" strategy (many things) instead of "Hedgehog" (one big thing done excellently)'],
    approves: ['Hedgehog Concept is clear and guides resource allocation', 'Flywheel is identified and each turn feeds the next', 'Strategy favors discipline and consistency over brilliance and luck'],
    modes: { discussion: '"What\'s the flywheel? How does each turn accelerate the next?"', debate: '"You\'re being a fox — chasing too many things instead of one great one"', socratic: '"What could you be the best in the world at? Not just good — the best?"' },
    focusAreas: ['growth']
  },
  'nassim-taleb': {
    name: 'Nassim Nicholas Taleb', domain: 'Risk & Antifragility', tokens: 320,
    methodology: 'Antifragility, barbell strategy, skin in the game, black swan awareness',
    voice: "What's your exposure to ruin? You're optimizing for the average case while ignoring tail risks.",
    perspective: `Taleb distrusts predictions and plans that assume normality. He looks for fragility — systems that break under stress — and pushes toward antifragility — systems that gain from disorder. He evaluates strategies through asymmetry: what's the downside vs. upside?`,
    looksFor: ['Asymmetric payoff profiles — limited downside, unlimited upside', 'Antifragility — does the system benefit from volatility and stress?', 'Skin in the game — do decision-makers bear the consequences?'],
    redFlags: ['Fragile dependencies (single supplier, single revenue stream, single point of failure)', 'Plans that assume smooth, predictable conditions', 'Decision-makers with no downside exposure (no skin in the game)'],
    approves: ['Strategy has convex payoffs (more upside than downside from volatility)', 'Key risks have explicit caps (barbell strategy)', 'Optionality is preserved — ability to change course cheaply'],
    modes: { discussion: '"Where\'s the fragility? What breaks under stress?"', debate: '"Your plan assumes the future will look like the past — it won\'t"', socratic: '"What\'s the worst case? Not the likely worst — the actual worst?"' },
    focusAreas: ['risk'], isDefault: true
  },
  'donella-meadows': {
    name: 'Donella Meadows', domain: 'Systems Thinking', tokens: 280,
    methodology: 'Systems dynamics, leverage points, feedback loops, mental models',
    voice: "Where are the feedback loops? You're treating a system problem as a linear cause-and-effect.",
    perspective: `Meadows sees everything as interconnected systems with stocks, flows, and feedback loops. She looks for the leverage points — places where a small intervention produces large systemic change.`,
    looksFor: ['Feedback loops (reinforcing and balancing) that drive system behavior', 'Leverage points — where small changes produce outsized effects', 'System boundaries — what\'s included, what\'s excluded, and why'],
    redFlags: ['Linear cause-and-effect thinking in a complex system', 'Ignoring delays between action and consequence', 'Optimizing a subsystem at the expense of the whole'],
    approves: ['Key feedback loops are identified and understood', 'Intervention targets high-leverage points, not symptoms', 'Mental models are explicit and open to revision'],
    modes: { discussion: '"Let\'s map the feedback loops — what reinforces what?"', debate: '"You\'re treating a symptom, not the system structure causing it"', socratic: '"What happens three steps downstream from this decision?"' },
    focusAreas: ['risk']
  },
  'jeanluc-doumont': {
    name: 'Jean-luc Doumont', domain: 'Structured Communication', tokens: 250,
    methodology: 'Structured communication systems, audience-first design, visual clarity',
    voice: "What is the one message you want your audience to take away? Everything else must serve that message.",
    perspective: `Doumont applies engineering discipline to communication. Every document, slide, or presentation has one core message — everything included must support it, everything that doesn't must be removed.`,
    looksFor: ['Single clear message per communication unit', 'Structure that makes the logic visible without reading every word', 'Audience-appropriate level of detail'],
    redFlags: ['Documents that bury the conclusion at the end', 'Visual clutter — decorative elements that add no information', 'Writing for the author\'s ego instead of the reader\'s needs'],
    approves: ['Core message is stated upfront and everything supports it', 'Structure is scannable — headings, hierarchy, and flow guide the reader', 'Nothing is included that doesn\'t serve the audience'],
    modes: { discussion: '"What\'s the one sentence summary? Lead with that"', debate: '"This section doesn\'t serve your message — cut it"', socratic: '"If your reader has 30 seconds, what do they need to know?"' },
    focusAreas: ['communication']
  }
};

const FOCUS_AREAS = {
  competitive: { name: 'Competitive', tag: 'tag-comp', lead: 'michael-porter', experts: ['michael-porter', 'clayton-christensen', 'wckim-mauborgne'], description: 'Competitive positioning, market forces, strategy' },
  growth: { name: 'Growth', tag: 'tag-grow', lead: 'seth-godin', experts: ['seth-godin', 'jim-collins', 'peter-drucker'], description: 'Marketing, tribe building, scaling' },
  risk: { name: 'Risk', tag: 'tag-risk', lead: 'nassim-taleb', experts: ['nassim-taleb', 'donella-meadows'], description: 'Risk management, antifragility, systems dynamics' },
  communication: { name: 'Communication', tag: 'tag-comm', lead: 'jeanluc-doumont', experts: ['jeanluc-doumont', 'seth-godin'], description: 'Structured clarity, presentation, stakeholder messaging' }
};

// ── Example business being analyzed ──
const EXAMPLE_BIZ = {
  title: "SVG-PAINT — Etsy Digital Asset Platform",
  summary: "Local-first SVG generation platform for Etsy sellers creating print-ready contrast cards and content sheets for children's products.",
  details: [
    "Target: Etsy digital download sellers (children's educational products)",
    "Revenue: One-time license fee for the tool + optional template packs",
    "Differentiator: Built-in accessibility (contrast checking by age range)",
    "Tech: Local-first (no cloud dependency), batch generation (100K+ glyphs)",
    "Market: Growing Etsy digital downloads niche (~$2B/year, 45% YoY growth)"
  ]
};

let state = {
  mode: 'discussion',
  focus: 'competitive',
  selectedExpert: 'michael-porter',
  view: 'experts'
};

function render() {
  renderControls();
  renderSidebar();
  renderContent();
}

function renderControls() {
  const el = document.getElementById('controls');
  const modes = ['discussion', 'debate', 'socratic'];
  const focuses = Object.keys(FOCUS_AREAS);
  el.innerHTML = `
    <div class="control-group">
      <label>Mode</label>
      ${modes.map(m => `<button class="ctrl-btn ${state.mode === m ? 'active' : ''}" onclick="setMode('${m}')">${m}</button>`).join('')}
    </div>
    <div class="control-group">
      <label>Focus</label>
      ${focuses.map(f => `<button class="ctrl-btn ${state.focus === f ? 'active' : ''}" onclick="setFocus('${f}')">${FOCUS_AREAS[f].name}</button>`).join('')}
    </div>
    <div class="control-group" style="margin-left:auto;">
      <label>View</label>
      <button class="ctrl-btn ${state.view === 'experts' ? 'active' : ''}" onclick="setView('experts')">Experts</button>
      <button class="ctrl-btn ${state.view === 'session' ? 'active' : ''}" onclick="setView('session')">Live Session</button>
      <button class="ctrl-btn ${state.view === 'synthesis' ? 'active' : ''}" onclick="setView('synthesis')">Synthesis</button>
    </div>
  `;
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const focus = FOCUS_AREAS[state.focus];
  const activeExperts = focus.experts;
  const sortedKeys = Object.keys(EXPERTS).sort((a, b) => {
    const aA = activeExperts.includes(a), bA = activeExperts.includes(b);
    if (aA && !bA) return -1;
    if (!aA && bA) return 1;
    return 0;
  });

  let html = `<div class="sidebar-title">Panel: ${focus.name} Focus (${activeExperts.length} experts)</div>`;
  sortedKeys.forEach(key => {
    const e = EXPERTS[key];
    const isActive = activeExperts.includes(key);
    const isDefault = e.isDefault;
    let badge = '';
    if (key === focus.lead) badge = '<span class="expert-badge badge-default">LEAD</span>';
    else if (isDefault && isActive) badge = '<span class="expert-badge badge-default">DEFAULT</span>';

    html += `<div class="expert-card ${state.selectedExpert === key ? 'active' : ''} ${!isActive ? 'dimmed' : ''}" onclick="selectExpert('${key}')">
      ${badge}
      <div class="expert-name">${e.name}</div>
      <div class="expert-domain">${e.domain}</div>
      <div class="token-cost">~${e.tokens} tokens</div>
    </div>`;
  });
  el.innerHTML = html;
}

function renderContent() {
  const el = document.getElementById('content');
  if (state.view === 'experts') renderExpertView(el);
  else if (state.view === 'session') renderSessionView(el);
  else renderSynthesisView(el);
}

function renderExpertView(el) {
  const e = EXPERTS[state.selectedExpert];
  const focus = FOCUS_AREAS[state.focus];
  const isOnPanel = focus.experts.includes(state.selectedExpert);
  const tagClass = state.focus === 'competitive' ? 'tag-comp' : state.focus === 'growth' ? 'tag-grow' : state.focus === 'risk' ? 'tag-risk' : 'tag-comm';

  el.innerHTML = `<div class="content-grid">
    <div class="card full">
      <h3>${e.name} <span class="tag ${tagClass}">${FOCUS_AREAS[state.focus].name} Panel</span>
      ${!isOnPanel ? '<span class="tag" style="background:rgba(248,81,73,0.15);color:var(--red);">Not on this panel</span>' : ''}
      ${state.selectedExpert === focus.lead ? '<span class="tag" style="background:rgba(240,136,62,0.15);color:var(--orange);">Panel Lead</span>' : ''}</h3>
      <div class="body">
        <div class="quote">"${e.voice}"<div class="attribution">— ${e.name}, typical ${state.mode} mode response</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Perspective</h3>
      <div class="body"><p>${e.perspective}</p></div>
    </div>
    <div class="card">
      <h3>Methodology</h3>
      <div class="body">
        <p><code>${e.methodology}</code></p>
        <p style="margin-top:12px;"><strong>In ${state.mode} mode:</strong></p>
        <div class="quote" style="border-left-color:var(--purple);">${e.modes[state.mode]}</div>
      </div>
    </div>
    <div class="card">
      <h3>Looks For <span class="tag tag-grow">approves</span></h3>
      <div class="body"><ul>${e.looksFor.map(l => `<li><span class="ok">${l}</span></li>`).join('')}</ul></div>
    </div>
    <div class="card">
      <h3>Red Flags <span class="tag tag-risk">rejects</span></h3>
      <div class="body"><ul>${e.redFlags.map(r => `<li><span class="danger">${r}</span></li>`).join('')}</ul></div>
    </div>
    <div class="card full">
      <h3>Approval Criteria</h3>
      <div class="body"><p class="dim">This expert endorses when:</p><ul>${e.approves.map(a => `<li>${a}</li>`).join('')}</ul></div>
    </div>
  </div>`;
}

function renderSessionView(el) {
  const focus = FOCUS_AREAS[state.focus];
  const modeLabel = { discussion: 'Discussion — Collaborative Analysis', debate: 'Debate — Adversarial Stress Test', socratic: 'Socratic Inquiry — Strategic Questioning' };

  el.innerHTML = `
    <div class="card full" style="margin-bottom:20px;">
      <h3>Business Under Analysis <span class="tag tag-mode">${EXAMPLE_BIZ.title}</span></h3>
      <div class="body">
