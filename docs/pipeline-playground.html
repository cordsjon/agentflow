<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shepherd Pipeline — Idea to Commit</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --border-active: #58a6ff;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
    --accent: #58a6ff;
    --green: #3fb950;
    --green-dim: #238636;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
    --cyan: #39d2c0;
    --pink: #f778ba;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header h1 {
    font-size: 20px;
    color: var(--text-bright);
    font-weight: 600;
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
  }
  .header .logo {
    font-size: 28px;
    filter: grayscale(0.3);
  }

  /* ── Example selector ── */
  .example-bar {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  .example-bar label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .example-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .example-btn:hover { border-color: var(--accent); color: var(--accent); }
  .example-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.1); color: var(--accent); }

  /* ── Main layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr;
    height: calc(100vh - 105px);
  }

  /* ── Pipeline rail ── */
  .pipeline-rail {
    padding: 20px 32px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .rail-track {
    display: flex;
    align-items: center;
    gap: 0;
    min-width: max-content;
  }
  .stage-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .stage-node:hover .node-circle { transform: scale(1.15); }
  .stage-node.active .node-circle {
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent);
  }
  .node-circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border: 2px solid var(--border);
    background: var(--surface2);
    transition: all 0.2s;
    position: relative;
  }
  .node-circle.file { border-color: var(--accent); background: rgba(88,166,255,0.1); }
  .node-circle.command { border-color: var(--purple); background: rgba(188,140,255,0.1); }
  .node-circle.gate { border-color: var(--yellow); background: rgba(210,153,34,0.1); }
  .node-circle.loop { border-color: var(--green); background: rgba(63,185,80,0.1); }
  .node-circle.done { border-color: var(--green); background: rgba(63,185,80,0.15); }

  .node-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
    max-width: 72px;
    line-height: 1.3;
    font-weight: 500;
  }
  .stage-node.active .node-label { color: var(--accent); }
  .stage-node.visited .node-circle { opacity: 0.5; }
  .stage-node.visited .node-label { opacity: 0.5; }

  .connector {
    width: 32px;
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    position: relative;
    top: -10px;
  }
  .connector.passed { background: var(--green-dim); }
  .connector.active-conn { background: var(--accent); }
  .connector::after {
    content: '';
    position: absolute;
    right: -3px;
    top: -3px;
    width: 0;
    height: 0;
    border-left: 5px solid var(--border);
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }
  .connector.passed::after { border-left-color: var(--green-dim); }
  .connector.active-conn::after { border-left-color: var(--accent); }

  /* ── Detail panel ── */
  .detail-panel {
    padding: 32px;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-content: start;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    overflow: hidden;
  }
  .card.full-width { grid-column: 1 / -1; }
  .card h3 {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card h3 .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 500;
  }
  .badge-file { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge-cmd { background: rgba(188,140,255,0.15); color: var(--purple); }
  .badge-gate { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-loop { background: rgba(63,185,80,0.15); color: var(--green); }

  .card-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .card-body code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--cyan);
  }
  .card-body pre {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    padding: 14px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 10px 0;
    line-height: 1.6;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .card-body .highlight { color: var(--accent); font-weight: 500; }
  .card-body .warn { color: var(--yellow); }
  .card-body .danger { color: var(--red); }
  .card-body .ok { color: var(--green); }
  .card-body .dim { color: var(--text-dim); }
  .card-body .purple { color: var(--purple); }

  .card-body ul { padding-left: 18px; }
  .card-body li { margin-bottom: 4px; }
  .card-body li::marker { color: var(--text-dim); }

  .arrow-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: var(--mono);
    margin: 8px 0;
  }

  /* ── Progress bar ── */
  .progress-bar {
    padding: 8px 32px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
    white-space: nowrap;
  }

  /* ── Nav buttons ── */
  .nav-buttons {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }
  .nav-btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary { background: rgba(88,166,255,0.15); border-color: var(--accent); color: var(--accent); }

  /* ── Checklist ── */
  .checklist { list-style: none; padding-left: 0; }
  .checklist li {
    padding: 4px 0;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .checklist li::before { content: none; }
  .check { color: var(--green); font-family: var(--mono); flex-shrink: 0; }
  .uncheck { color: var(--text-dim); font-family: var(--mono); flex-shrink: 0; }
  .fail-check { color: var(--red); font-family: var(--mono); flex-shrink: 0; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .detail-panel { grid-template-columns: 1fr; }
    .card.full-width { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🐑</div>
  <div>
    <h1>Shepherd Pipeline Explorer</h1>
    <div class="subtitle">Trace a requirement from raw idea to committed code — every stage, gate, and artifact</div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <a href="spec-panel-playground.html" style="font-size:12px;color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:5px;font-family:var(--mono);">👥 Spec Panel</a>
    <a href="business-panel-playground.html" style="font-size:12px;color:var(--orange);text-decoration:none;padding:5px 12px;border:1px solid var(--border);border-radius:5px;font-family:var(--mono);">📊 Business Panel</a>
  </div>
</div>

<div class="example-bar">
  <label>Example:</label>
  <button class="example-btn active" onclick="loadExample('feature')">Feature</button>
  <button class="example-btn" onclick="loadExample('bug')">Bug Fix</button>
  <button class="example-btn" onclick="loadExample('hotfix')">Hotfix</button>
</div>

<div class="main">
  <div class="pipeline-rail">
    <div class="rail-track" id="rail"></div>
  </div>
  <div class="detail-panel" id="detail"></div>
</div>

<div class="progress-bar">
  <span class="progress-text" id="progress-label">Stage 1 / 13</span>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="nav-buttons">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">&larr; Prev</button>
    <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">Next &rarr;</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA: Three complete example journeys
// ─────────────────────────────────────────────

const EXAMPLES = {

// ═══════════════ FEATURE EXAMPLE ═══════════════
feature: {
  title: "Metric Print Sizes for EU Market",
  stages: [
    // 0 ── INBOX
    {
      id: "inbox", label: "INBOX", icon: "📥", type: "file",
      summary: "A raw idea lands in the inbox",
      cards: [
        { title: "What arrives", badge: "INBOX.md", badgeType: "file", full: true, body: `
<pre>## Inbox

- EU customers keep asking for metric print sizes (A4, A5, 10×15cm).
  Saw 3 Etsy reviews this week mentioning it. Currently we only
  export imperial (4×6, 5×7, 8×10). Could we add ISO + metric photo
  sizes? Link to Etsy review: [screenshot in Slack #product]

  Also — make sure contrast checking still works at different DPIs.
  Some metric sizes have different aspect ratios than imperial.</pre>
<p class="dim">This is the raw dump — unstructured, conversational, possibly contains multiple concerns mixed together. The inbox accepts anything: ideas, links, screenshots, bug reports, constraints.</p>
        `},
        { title: "Rules at this stage", body: `
<ul>
  <li>Anyone can write to INBOX — no format required</li>
  <li>Items stay here until <code>/triage</code> processes them</li>
  <li>Never partially process — all items in, all items out</li>
  <li>No implementation happens from INBOX — ever</li>
</ul>
        `},
        { title: "What happens next", body: `
<p>The <span class="purple">/triage</span> command reads every bullet, classifies it, and routes it to the correct destination. This inbox entry contains two concerns:</p>
<ol>
  <li>A <span class="highlight">feature request</span> (metric sizes)</li>
  <li>A <span class="warn">constraint clarification</span> (contrast at different DPIs)</li>
</ol>
        `}
      ]
    },

    // 1 ── /triage
    {
      id: "triage", label: "/triage", icon: "🏷", type: "command",
      summary: "Classify and route to the correct pipeline lane",
      cards: [
        { title: "Triage output", badge: "/triage", badgeType: "cmd", full: true, body: `
<pre>Triaged 2 items:
  → BACKLOG#Ideation: "Metric print sizes (ISO + metric photo)" [feature]
  → CLAUDE.md §2 notes: "Contrast checking must validate at all
    export DPIs, not just 96" [constraint]

INBOX.md cleared: <span class="ok">Empty — all items triaged.</span></pre>
<p>The triage skill split the single inbox dump into two separate concerns and routed each to its correct destination. The constraint went directly into the project's rules file — it doesn't need a backlog entry.</p>
        `},
        { title: "Classification rules", body: `
<ul>
  <li><span class="highlight">Feature / enhancement</span> → BACKLOG#Ideation</li>
  <li><span class="warn">Bug / regression</span> → BACKLOG#Ideation with <code>[bug]</code> tag</li>
  <li><span class="purple">Constraint / context</span> → CLAUDE.md or requirements doc</li>
  <li><span class="danger">Hotfix</span> → Can fast-track directly to TODO-Today</li>
  <li><span class="dim">Duplicate</span> → Noted and discarded</li>
</ul>
        `},
        { title: "Artifact created", body: `
<p>New entry appended to <code>BACKLOG.md#Ideation</code>:</p>
<pre>- <strong>Metric print sizes (ISO + metric photo)</strong>
    (triaged from INBOX 2026-03-12)
  - EU market demand — 3 Etsy reviews requesting
    A4/A5/10×15cm exports
  - <strong>Status:</strong> Idea only. Needs spec before Refining.
  - <strong>Next:</strong> /sc:brainstorm to explore scope,
    format mapping, DPI implications</pre>
        `}
      ]
    },

    // 2 ── BACKLOG: Ideation
    {
      id: "ideation", label: "Ideation", icon: "💡", type: "file",
      summary: "Raw idea sitting in the backlog, waiting for exploration",
      cards: [
        { title: "Backlog state", badge: "BACKLOG.md#Ideation", badgeType: "file", full: true, body: `
<pre>## Ideation

- <strong>Metric print sizes (ISO + metric photo)</strong>
    (triaged from INBOX 2026-03-12)
  - EU market demand — Etsy reviews requesting A4/A5/10×15cm
  - Status: Idea only. Needs spec before Refining.
  - Next: /sc:brainstorm to explore scope

- <span class="dim">PDF export engine [feature] — waiting on dep analysis</span>
- <span class="dim">Batch tagging performance [perf] — needs profiling data</span></pre>
<p>The ideation lane holds raw ideas alongside other items at various stages of readiness. Items here have no spec, no user stories, no acceptance criteria yet.</p>
        `},
        { title: "Graduation criteria", body: `
<p>To move from Ideation → Refining, the item needs:</p>
<ul>
  <li><span class="check">[&nbsp;]</span> <code>/sc:brainstorm</code> output exists — deep exploration of requirements, edge cases, and alternatives</li>
  <li>The brainstorm produces a requirements document that becomes the foundation for user stories</li>
</ul>
<p class="dim">No code is written during Ideation. This is pure discovery.</p>
        `},
        { title: "Time in stage", body: `
<p>Items can sit in Ideation for days or weeks. There's no SLA — this is the <span class="highlight">human-driven outer loop</span>. The user decides when to invest brainstorming time on an idea.</p>
<p>The trigger to move forward is usually: <em>"I want to build this next"</em> → run <code>/sc:brainstorm</code>.</p>
        `}
      ]
    },

    // 3 ── /sc:brainstorm
    {
      id: "brainstorm", label: "/brainstorm", icon: "🧠", type: "command",
      summary: "Deep Socratic exploration of the requirement",
      cards: [
        { title: "Brainstorm session (abbreviated)", badge: "/sc:brainstorm", badgeType: "cmd", full: true, body: `
<pre><span class="purple">───── Brainstorm: Metric Print Sizes ─────</span>

<span class="highlight">Q1: Who is the primary user?</span>
→ Etsy sellers creating contrast cards for EU/UK market.
  They need to list metric sizes in product descriptions.

<span class="highlight">Q2: What metric systems exist?</span>
→ Three categories identified:
  • ISO paper: A6 (105×148mm), A5 (148×210mm), A4 (210×297mm)
  • Metric photo: 10×15cm, 13×18cm, 20×25cm
  • Existing imperial: 4×6", 5×7", 8×10"

<span class="highlight">Q3: How do we store dimensions internally?</span>
→ All sizes stored as inches (96 DPI). Metric converted on input.
  Display unit is per-project preference (imperial/metric/both).

<span class="highlight">Q4: Impact on existing features?</span>
→ Contrast checking: works on color values, DPI-independent ✓
→ SVG viewBox: always 0 0 100 100, scaled at export ✓
→ Export pipeline: needs new size entries + aspect ratio calc
→ UI: size picker dropdown needs grouping by measurement system

<span class="highlight">Q5: What could go wrong?</span>
→ Aspect ratio mismatch: A4 is 1:√2, imperial is 2:3/5:7
→ Need intelligent cropping or padding strategy
→ Font license check still applies at all sizes</pre>
        `},
        { title: "Output artifact", body: `
<p>The brainstorm produces <code>requirements/METRIC_SIZES.md</code> — a structured requirements document with:</p>
<ul>
  <li>Problem statement & user need</li>
  <li>Proposed solution with alternatives considered</li>
  <li>Edge cases and risks identified</li>
  <li>Dependencies on existing systems</li>
</ul>
<p>This document becomes the input for the <span class="highlight">Refining</span> stage.</p>
        `},
        { title: "Item moves to Refining", body: `
<p>After brainstorm completes, the backlog item graduates:</p>
<pre>## Refining

- <strong>Metric print sizes (ISO + metric photo)</strong>
  - Spec: requirements/METRIC_SIZES.md
  - <strong>Next:</strong> Write User Stories + AC, then
    /sc:business-panel → /sc:spec-panel for review</pre>
        `}
      ]
    },

    // 4 ── BACKLOG: Refining
    {
      id: "refining", label: "Refining", icon: "🔧", type: "file",
      summary: "Spec exists — now write User Stories and Acceptance Criteria",
      cards: [
        { title: "User Stories being written", badge: "requirements/METRIC_SIZES.md", badgeType: "file", full: true, body: `
<pre><span class="highlight">## User Stories</span>

<strong>US-MS-1:</strong> As an Etsy seller, I want to select metric
print sizes (A4, A5, A6, 10×15cm, 13×18cm, 20×25cm) when
creating a project, so that I can list accurate dimensions
for EU customers.

  <strong>AC-1.1:</strong> Size picker shows 3 groups: Imperial,
         Metric Photo, Metric ISO
  <strong>AC-1.2:</strong> Per-project "measurement system" setting
         filters which groups appear
  <strong>AC-1.3:</strong> All sizes stored internally as inches (96 DPI)
  <strong>AC-1.4:</strong> Display converts to user's preferred unit

<strong>US-MS-2:</strong> As a seller, I want exported SVGs at metric
sizes to maintain correct aspect ratios, so that prints
aren't distorted.

  <strong>AC-2.1:</strong> A-series uses 1:√2 aspect ratio
  <strong>AC-2.2:</strong> Metric photo uses closest standard ratio
  <strong>AC-2.3:</strong> Content is center-cropped, not stretched
  <strong>AC-2.4:</strong> viewBox remains "0 0 100 100", scaling
         applied at export

<strong>US-MS-3:</strong> As a seller, I want contrast checks to pass
at all metric sizes, so that accessibility is maintained.

  <strong>AC-3.1:</strong> Contrast ratios validated per age-range tier
  <strong>AC-3.2:</strong> Background luminance checks apply equally
  <strong>AC-3.3:</strong> No size-specific contrast bypass</pre>
        `},
        { title: "What's checked during refining", body: `
<ul>
  <li><span class="check">[✓]</span> User Stories follow "As a [role]..." format</li>
  <li><span class="check">[✓]</span> Each US has testable Acceptance Criteria</li>
  <li><span class="check">[✓]</span> Spec document exists with functional requirements</li>
  <li><span class="uncheck">[ ]</span> Business panel reviewed <span class="dim">← strategic analysis first</span></li>
  <li><span class="uncheck">[ ]</span> Spec panel score ≥ 7.0 <span class="dim">← not yet reviewed</span></li>
  <li><span class="check">[✓]</span> Architecture decided (extends existing size system)</li>
  <li><span class="check">[✓]</span> Dependencies identified (export pipeline, UI picker)</li>
  <li><span class="check">[✓]</span> Test strategy: 3 unit test files + 1 integration</li>
</ul>
<p class="dim">Two missing items — business panel strategic review runs first, then spec panel scores the technical quality. Both must pass before Ready.</p>
        `},
        { title: "Clarity check", body: `
<p>Before the spec panel, <code>/requirements-clarity</code> catches ambiguities:</p>
<pre><span class="warn">⚠ Ambiguity found:</span> AC-2.2 says "closest standard
ratio" — which standard? Need explicit mapping table.

<span class="warn">⚠ Missing:</span> What happens when user switches
measurement system on an existing project with exports?

<span class="ok">✓ Clear:</span> Internal storage format (inches, 96 DPI)
<span class="ok">✓ Clear:</span> Contrast rules apply uniformly</pre>
<p>These are fixed in the spec before proceeding to the panel.</p>
        `}
      ]
    },

    // 5 ── /sc:business-panel
    {
      id: "biz-panel", label: "Biz Panel", icon: "📊", type: "gate",
      summary: "Strategic analysis by 9 business thought leaders — advisory, no pass/fail",
      cards: [
        { title: "Panel session", badge: "/sc:business-panel", badgeType: "cmd", full: true, body: `
<pre><span class="purple">═══ BUSINESS PANEL — Metric Print Sizes ═══</span>

<span class="highlight">Michael Porter (Competitive Strategy):</span>
"This is a smart extension — it expands addressable market
to EU without changing the competitive position. The contrast
checking moat applies equally to metric sizes. No new Five
Forces pressure introduced. <span class="ok">Low strategic risk.</span>"

<span class="highlight">Clayton Christensen (Jobs-to-be-Done):</span>
"The job stays the same: 'help me create professional

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

let currentExample = 'feature';
let currentStage = 0;

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function loadExample(name) {
  currentExample = name;
  currentStage = 0;
  document.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.example-btn[onclick*="${name}"]`).classList.add('active');
  renderAll();
}

function navigate(dir) {
  const stages = EXAMPLES[currentExample].stages;
  currentStage = Math.max(0, Math.min(stages.length - 1, currentStage + dir));
  renderAll();
}

function goToStage(idx) {
  currentStage = idx;
  renderAll();
}

function renderAll() {
  renderRail();
  renderDetail();
  renderProgress();
}

function renderRail() {
  const rail = document.getElementById('rail');
  const stages = EXAMPLES[currentExample].stages;
  rail.innerHTML = '';

  stages.forEach((s, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      if (i <= currentStage) conn.classList.add('passed');
      if (i === currentStage) conn.classList.add('active-conn');
      rail.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'stage-node';
    if (i === currentStage) node.classList.add('active');
    if (i < currentStage) node.classList.add('visited');
    node.onclick = () => goToStage(i);

    const circle = document.createElement('div');
    circle.className = `node-circle ${s.type}`;
    circle.textContent = s.icon;

    const label = document.createElement('div');
    label.className = 'node-label';
    label.textContent = s.label;

    node.appendChild(circle);
    node.appendChild(label);
    rail.appendChild(node);
  });
}

function renderDetail() {
  const panel = document.getElementById('detail');
  const stage = EXAMPLES[currentExample].stages[currentStage];

  let html = `<div class="card full-width" style="padding:16px 20px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:24px;">${stage.icon}</span>
      <div>
        <div style="font-size:16px;color:var(--text-bright);font-weight:600;">${stage.label}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:2px;">${stage.summary}</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--text-dim);font-family:var(--mono);">
        Stage ${currentStage + 1} / ${EXAMPLES[currentExample].stages.length}
      </div>
    </div>
  </div>`;

  stage.cards.forEach(card => {
    const fullClass = card.full ? ' full-width' : '';
    const badgeHtml = card.badge
      ? `<span class="badge badge-${card.badgeType || 'file'}">${card.badge}</span>`
      : '';
    html += `<div class="card${fullClass}">
      <h3>${card.title} ${badgeHtml}</h3>
      <div class="card-body">${card.body}</div>
    </div>`;
  });

  panel.innerHTML = html;
}

function renderProgress() {
  const stages = EXAMPLES[currentExample].stages;
  const pct = ((currentStage + 1) / stages.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `Stage ${currentStage + 1} / ${stages.length} — ${stages[currentStage].label}`;
  document.getElementById('btn-prev').disabled = currentStage === 0;
  document.getElementById('btn-next').disabled = currentStage === stages.length - 1;
}

// ── Keyboard nav ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigate(1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  if (e.key === '1') loadExample('feature');
  if (e.key === '2') loadExample('bug');
  if (e.key === '3') loadExample('hotfix');
});

// ── Init ──
renderAll();
</script>
