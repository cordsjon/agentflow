<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spec Panel — Expert Specification Review</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --text-bright: #f0f6fc;
    --accent: #58a6ff;
    --green: #3fb950;
    --green-dim: #238636;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #f0883e;
    --cyan: #39d2c0;
    --pink: #f778ba;
    --mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Layout ── */
  .header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; color: var(--text-bright); font-weight: 600; }
  .header .subtitle { font-size: 13px; color: var(--text-dim); }
  .header .back { font-size: 13px; color: var(--accent); text-decoration: none; margin-left: auto; font-family: var(--mono); }
  .header .back:hover { text-decoration: underline; }

  .controls { padding: 12px 32px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .control-group { display: flex; align-items: center; gap: 8px; }
  .control-group label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .ctrl-btn { padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { border-color: var(--accent); background: rgba(88,166,255,0.1); color: var(--accent); }

  .main { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 100px); }

  /* ── Expert sidebar ── */
  .sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); padding: 0; }
  .sidebar-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; padding: 16px 16px 8px; font-weight: 600; }

  .expert-card {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .expert-card:hover { background: var(--surface2); }
  .expert-card.active { background: var(--surface2); border-left: 3px solid var(--accent); }
  .expert-card.active .expert-name { color: var(--accent); }
  .expert-card.dimmed { opacity: 0.35; }

  .expert-name { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 2px; }
  .expert-domain { font-size: 11px; color: var(--text-dim); line-height: 1.4; }
  .expert-badge { position: absolute; top: 12px; right: 12px; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-lead { background: rgba(210,153,34,0.2); color: var(--yellow); }
  .badge-default { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-auto { background: rgba(188,140,255,0.15); color: var(--purple); }
  .token-cost { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-top: 3px; }

  /* ── Content area ── */
  .content { overflow-y: auto; padding: 24px 32px; }
  .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .card.full { grid-column: 1 / -1; }
  .card h3 { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card h3 .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: none; letter-spacing: 0; font-weight: 500; }
  .tag-req { background: rgba(88,166,255,0.15); color: var(--accent); }
  .tag-arch { background: rgba(188,140,255,0.15); color: var(--purple); }
  .tag-test { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag-comp { background: rgba(240,136,62,0.15); color: var(--orange); }
  .tag-mode { background: rgba(210,153,34,0.15); color: var(--yellow); }

  .body { font-size: 14px; line-height: 1.7; color: var(--text); }
  .body code { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 2px 6px; border-radius: 4px; color: var(--cyan); }
  .body pre { font-family: var(--mono); font-size: 12px; background: var(--bg); padding: 14px; border-radius: 6px; overflow-x: auto; margin: 10px 0; line-height: 1.6; border: 1px solid var(--border); white-space: pre-wrap; }
  .body ul { padding-left: 18px; }
  .body li { margin-bottom: 4px; }
  .body li::marker { color: var(--text-dim); }
  .hl { color: var(--accent); font-weight: 500; }
  .warn { color: var(--yellow); }
  .ok { color: var(--green); }
  .danger { color: var(--red); }
  .dim { color: var(--text-dim); }
  .purple { color: var(--purple); }

  /* ── Quote block ── */
  .quote { border-left: 3px solid var(--accent); padding: 12px 16px; background: rgba(88,166,255,0.05); border-radius: 0 6px 6px 0; margin: 10px 0; font-style: italic; color: var(--text-bright); font-size: 14px; line-height: 1.6; }
  .quote .attribution { font-style: normal; font-size: 12px; color: var(--text-dim); margin-top: 6px; }

  /* ── Score gauge ── */
  .score-row { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
  .score-label { font-size: 12px; color: var(--text-dim); width: 100px; flex-shrink: 0; }
  .score-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .score-val { font-size: 12px; font-family: var(--mono); width: 40px; text-align: right; flex-shrink: 0; }

  /* ── Nav ── */
  .nav-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .nav-tab { padding: 10px 18px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { max-height: 200px; }
    .content-grid { grid-template-columns: 1fr; }
    .card.full { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div><span style="font-size:24px;">👥</span></div>
  <div>
    <h1>/sc:spec-panel — Expert Specification Review</h1>
    <div class="subtitle">Multi-expert quality gate for Refining → Ready — 10 renowned experts, 4 focus areas, 3 analysis modes</div>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <a class="back" href="pipeline-playground.html">&larr; Pipeline</a>
    <a class="back" href="business-panel-playground.html" style="color:var(--orange);">📊 Business Panel</a>
  </div>
</div>

<div class="controls" id="controls"></div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ─────────────────────────────────────────────
// EXPERT DATA
// ─────────────────────────────────────────────

const EXPERTS = {
  'karl-wiegers': {
    name: 'Karl Wiegers',
    domain: 'Requirements Engineering',
    methodology: 'SMART criteria, testability analysis, stakeholder validation',
    panels: ['spec'], packs: ['core-requirements'],
    tokens: 350,
    voice: "This requirement lacks measurable acceptance criteria. How would you validate compliance in production?",
    perspective: `Wiegers treats every requirement as a contract between stakeholders and builders. A requirement that cannot be tested is not a requirement — it's a wish. He scans for ambiguous language ("appropriate," "user-friendly," "fast"), missing boundary conditions, and acceptance criteria that lack specific thresholds.`,
    looksFor: ['Measurable acceptance criteria with concrete values', 'Unambiguous language — no weasel words', 'Traceability from business goal to testable requirement'],
    redFlags: ['"The system shall handle errors gracefully" (undefined)', 'Requirements without stakeholder attribution', 'Missing non-functional requirements (performance, security, availability)'],
    approves: ['Every requirement has at least one testable acceptance criterion', 'Stakeholder roles and priorities are explicit', 'Requirements are traceable to business objectives'],
    modes: {
      discussion: 'Builds from specific examples, asks "how would you test this?"',
      critique: 'Defends requirement precision against "we\'ll figure it out later" shortcuts',
      socratic: '"Who is the primary stakeholder? What happens if this requirement is removed?"'
    },
    focusAreas: ['requirements', 'compliance'],
    isDefault: true
  },
  'gojko-adzic': {
    name: 'Gojko Adzic',
    domain: 'Specification by Example',
    methodology: 'Given/When/Then scenarios, example-driven requirements, collaborative specification',
    panels: ['spec'], packs: ['core-requirements', 'core-testing'],
    tokens: 300,
    voice: "Can you provide concrete examples demonstrating this requirement in real-world scenarios?",
    perspective: `Adzic believes specifications only become real when illustrated with concrete examples. Abstract requirements breed misunderstanding. He pushes every requirement toward executable examples that serve as both documentation and test cases. If you can't write a Given/When/Then for it, you don't understand it yet.`,
    looksFor: ['Concrete examples for every behavioral requirement', 'Given/When/Then scenarios that double as acceptance tests', 'Edge cases expressed as additional examples, not prose'],
    redFlags: ['Requirements described only in abstract terms', 'No examples for complex business rules', '"Happy path only" specifications with no error scenarios'],
    approves: ['Key behaviors have at least 2-3 concrete examples each', 'Examples cover happy path, edge cases, and error cases', 'Scenarios are specific enough to be automated as tests'],
    modes: {
      discussion: '"Let\'s make this concrete — give me an example of X"',
      critique: 'Challenges abstract specs with "show me an example where this breaks"',
      socratic: '"What would happen if the input were empty? What about a thousand items?"'
    },
    focusAreas: ['requirements', 'testing'],
    isDefault: true
  },
  'alistair-cockburn': {
    name: 'Alistair Cockburn',
    domain: 'Use Case Methodology',
    methodology: 'Goal-oriented analysis, primary actor identification, scenario modeling',
    panels: ['spec'], packs: ['core-requirements'],
    tokens: 280,
    voice: "Who is the primary stakeholder here, and what business goal are they trying to achieve?",
    perspective: `Cockburn starts from goals, not features. Every requirement must trace back to an actor with a purpose. He maps requirements to goal levels (summary, user-goal, subfunction) and exposes specs that confuse implementation details with user intent.`,
    looksFor: ['Clear actor identification with named goals', 'Goal-level hierarchy (why before what)', 'Main success scenario + extension scenarios'],
    redFlags: ['Features described without actor or goal context', 'Implementation details masquerading as requirements', 'Missing "what could go wrong" extensions'],
    approves: ['Every feature traces to a named actor and goal', 'Success and failure paths are both specified', 'Goal levels are appropriate (not too abstract, not too detailed)'],
    modes: {
      discussion: 'Reframes features as goals — "what is the user trying to accomplish?"',
      critique: 'Challenges feature-first thinking — "that\'s a solution, not a requirement"',
      socratic: '"What goal does this serve? What happens if the user abandons halfway?"'
    },
    focusAreas: ['requirements']
  },
  'martin-fowler': {
    name: 'Martin Fowler',
    domain: 'Software Architecture & Design',
    methodology: 'Interface segregation, bounded contexts, refactoring patterns, evolutionary design',
    panels: ['spec'], packs: ['core-engineering'],
    tokens: 320,
    voice: "This interface violates the single responsibility principle. Consider separating concerns.",
    perspective: `Fowler evaluates specifications through the lens of evolutionary design. Good architecture emerges from clear boundaries, small interfaces, and the discipline to refactor when abstractions no longer fit. He looks for coupling between components, bloated interfaces, and specifications that lock in decisions too early.`,
    looksFor: ['Clean interface boundaries between components', 'Single responsibility at every level of abstraction', 'Room for evolutionary change without breaking consumers'],
    redFlags: ['God objects or interfaces that do too many things', 'Tight coupling between components that should be independent', 'Premature optimization or over-specified implementation details'],
    approves: ['Components communicate through well-defined, minimal interfaces', 'Design allows for change without cascading modifications', 'Abstractions match the current understanding, not hypothetical futures'],
    modes: {
      discussion: 'Draws boundaries — "where does this responsibility end?"',
      critique: 'Challenges coupling — "if I change X, how many other things break?"',
      socratic: '"What would happen if we split this into two smaller interfaces?"'
    },
    focusAreas: ['architecture'],
    isDefault: true
  },
  'michael-nygard': {
    name: 'Michael Nygard',
    domain: 'Production Systems & Reliability',
    methodology: 'Failure mode analysis, circuit breaker patterns, operational excellence',
    panels: ['spec'], packs: ['core-engineering'],
    tokens: 300,
    voice: "What happens when this component fails? Where are the monitoring and recovery mechanisms?",
    perspective: `Nygard thinks in failure modes. Every system will break — the question is how. He evaluates specs for missing error handling, absent monitoring, unspecified timeouts, and the assumption that dependencies are always available.`,
    looksFor: ['Explicit failure modes and recovery strategies', 'Timeout specifications for every external call', 'Monitoring, alerting, and observability requirements'],
    redFlags: ['No mention of what happens when a dependency is unavailable', 'Missing timeout values', 'No operational requirements (logging, metrics, health checks)'],
    approves: ['Every external dependency has a failure mode and recovery plan', 'Timeouts and retry policies are specified with concrete values', 'Operational concerns (monitoring, alerting, runbooks) are addressed'],
    modes: {
      discussion: '"Let\'s trace the failure path — component A goes down, then what?"',
      critique: 'Challenges optimistic assumptions — "you\'re assuming 100% uptime"',
      socratic: '"What\'s your MTTR target? How would the on-call engineer diagnose this?"'
    },
    focusAreas: ['architecture', 'compliance'],
    autoKeywords: ['reliability', 'failure', 'circuit', 'resilience', 'production']
  },
  'sam-newman': {
    name: 'Sam Newman',
    domain: 'Distributed Systems & APIs',
    methodology: 'Service decomposition, API versioning, distributed system patterns',
    panels: ['spec'], packs: ['core-engineering'],
    tokens: 280,
    voice: "How does this specification handle service evolution and backward compatibility?",
    perspective: `Newman evaluates how services communicate, evolve, and fail independently. He looks for proper service boundaries, API versioning strategies, and whether the spec accounts for the realities of distributed systems — network partitions, eventual consistency, and independent deployability.`,
    looksFor: ['Well-defined service boundaries', 'API versioning and evolution strategy', 'Independent deployability'],
    redFlags: ['Services sharing databases or internal state', 'No API versioning strategy', 'Synchronous coupling where async would be safer'],
    approves: ['Each service owns its data', 'API contracts are versioned and backward-compatible', 'Services can be deployed independently'],
    modes: {
      discussion: '"Where are the service boundaries? What data does each service own?"',
      critique: '"Shared databases are not microservices — that\'s a distributed monolith"',
      socratic: '"If you need to deploy service A, must you also deploy service B?"'
    },
    focusAreas: ['architecture'],
    autoKeywords: ['api', 'rest', 'graphql', 'microservice', 'distributed']
  },
  'gregor-hohpe': {
    name: 'Gregor Hohpe',
    domain: 'Enterprise Integration Patterns',
    methodology: 'Message-driven architecture, integration patterns, event-driven design',
    panels: ['spec'], packs: ['core-engineering'],
    tokens: 280,
    voice: "What's the message exchange pattern here? How do you handle ordering and delivery guarantees?",
    perspective: `Hohpe evaluates how systems integrate and communicate. He maps data flows, identifies coupling through shared state, and pushes toward message-driven architectures that decouple producers from consumers.`,
    looksFor: ['Clear message exchange patterns', 'Decoupled producers and consumers', 'Explicit ordering and delivery guarantees'],
    redFlags: ['Point-to-point integrations with no abstraction', 'Assumption of immediate consistency across systems', 'No error handling for message delivery failures'],
    approves: ['Integration patterns are named and well-understood', 'Async communication where appropriate', 'Dead letter queues and retry policies specified'],
    modes: {
      discussion: '"Let\'s map the data flow — who produces, who consumes, what format?"',
      critique: '"This integration is brittle — one change cascades everywhere"',
      socratic: '"What happens if a message is delivered twice? Or not at all?"'
    },
    focusAreas: ['architecture'],
    autoKeywords: ['messaging', 'event', 'queue', 'pubsub', 'integration']
  },
  'lisa-crispin': {
    name: 'Lisa Crispin',
    domain: 'Agile Testing & Quality',
    methodology: 'Whole-team testing, risk-based testing, quality attribute specification',
    panels: ['spec'], packs: ['core-testing'],
    tokens: 280,
    voice: "How would the testing team validate this requirement? What are the edge cases and failure scenarios?",
    perspective: `Crispin sees quality as a whole-team responsibility, not a phase. She evaluates specs for testability — can this be automated? Are edge cases identified? Is the test strategy proportional to the risk?`,
    looksFor: ['Testability of every requirement', 'Edge case identification and error scenario coverage', 'Test strategy proportional to risk'],
    redFlags: ['Requirements that can only be validated manually', 'No edge cases or error scenarios mentioned', '"Testing will be done later" attitude'],
    approves: ['Every requirement has a clear test strategy', 'Edge cases and error scenarios are explicitly listed', 'Risk-based prioritization guides test coverage depth'],
    modes: {
      discussion: '"What\'s the test strategy for this? Unit, integration, or E2E?"',
      critique: '"You can\'t test this requirement as written — it\'s not measurable"',
      socratic: '"What\'s the riskiest part of this spec? Where would a bug hurt most?"'
    },
    focusAreas: ['testing'],
    isDefault: true
  },
  'janet-gregory': {
    name: 'Janet Gregory',
    domain: 'Collaborative Testing',
    methodology: 'Specification workshops, three amigos, quality conversation facilitation',
    panels: ['spec'], packs: ['core-testing'],
    tokens: 250,
    voice: "Did the whole team participate in creating this specification? Are quality expectations clearly defined?",
    perspective: `Gregory focuses on the collaborative process behind specifications. She evaluates whether all perspectives — business, development, testing — were represented in creating the spec. Specifications written in isolation breed assumptions.`,
    looksFor: ['Evidence of collaborative specification creation', 'Quality expectations from all perspectives', 'Shared understanding across roles'],
    redFlags: ['Spec written by one role in isolation', 'No mention of team agreement or review', 'Quality attributes defined without tester input'],
    approves: ['Three amigos process was followed', 'Quality expectations are shared and explicit', 'Spec has been reviewed by diverse perspectives'],
    modes: {
      discussion: '"Who else was in the room when this was written?"',
      critique: '"This reads like a developer spec — where\'s the business perspective?"',
      socratic: '"If you showed this to a tester right now, what questions would they ask?"'
    },
    focusAreas: ['testing']
  },
  'kelsey-hightower': {
    name: 'Kelsey Hightower',
    domain: 'Cloud Native & Operations',
    methodology: 'Cloud-native patterns, infrastructure automation, operational observability',
    panels: ['spec'], packs: [],
    tokens: 280,
    voice: "How does this specification handle cloud-native deployment and operational concerns?",
    perspective: `Hightower evaluates operational readiness. He looks for deployment strategies, infrastructure requirements, observability, and whether the spec accounts for the realities of cloud-native environments — scaling, health checks, configuration management.`,
    looksFor: ['Deployment strategy and infrastructure requirements', 'Health checks and readiness probes', 'Configuration management and secrets handling'],
    redFlags: ['No mention of deployment or operational concerns', 'Hardcoded configuration values', 'No health check or monitoring endpoints'],
    approves: ['Deployment is automated and repeatable', 'Configuration is externalized', 'Observability is built in from the start'],
    modes: {
      discussion: '"How does this get deployed? What does the health check look like?"',
      critique: '"You\'ve specified the feature but not how to operate it in production"',
      socratic: '"What happens at 3 AM when this fails and the on-call engineer gets paged?"'
    },
    focusAreas: ['compliance'],
    autoKeywords: ['cloud', 'deploy', 'k8s', 'kubernetes', 'docker', 'infrastructure']
  }
};

const FOCUS_AREAS = {
  requirements: { name: 'Requirements', tag: 'tag-req', lead: 'karl-wiegers', experts: ['karl-wiegers', 'gojko-adzic', 'alistair-cockburn'], description: 'Requirement clarity, completeness, testability' },
  architecture: { name: 'Architecture', tag: 'tag-arch', lead: 'martin-fowler', experts: ['martin-fowler', 'sam-newman', 'gregor-hohpe', 'michael-nygard'], description: 'Interface design, boundaries, scalability, patterns' },
  testing: { name: 'Testing', tag: 'tag-test', lead: 'lisa-crispin', experts: ['lisa-crispin', 'janet-gregory', 'gojko-adzic'], description: 'Test strategy, coverage, edge cases, acceptance criteria' },
  compliance: { name: 'Compliance', tag: 'tag-comp', lead: 'karl-wiegers', experts: ['karl-wiegers', 'michael-nygard', 'kelsey-hightower'], description: 'Regulatory coverage, security, operational requirements' }
};

const SCORING = { clarity: 0, completeness: 0, testability: 0, consistency: 0 };

// ─── Example Spec (used in live demo) ───
const EXAMPLE_SPEC = {
  title: "Metric Print Sizes for EU Market",
  requirements: [
    { id: 'R-001', text: 'System SHALL support 6 metric print sizes: A6, A5, A4, 10×15cm, 13×18cm, 20×25cm', status: 'ok' },
    { id: 'R-002', text: 'All sizes SHALL be stored internally as inches at 96 DPI', status: 'ok' },
    { id: 'R-003', text: 'Size picker SHALL group sizes by measurement system (Imperial, Metric Photo, Metric ISO)', status: 'ok' },
    { id: 'R-004', text: 'Per-project measurement system setting SHALL filter which groups appear in UI', status: 'ok' },
    { id: 'R-005', text: 'Exported SVGs SHALL maintain correct aspect ratios for each size category', status: 'warn' },
    { id: 'R-006', text: 'Contrast validation SHALL apply uniformly across all sizes per age-range tier', status: 'ok' },
    { id: 'R-007', text: 'System SHALL handle errors gracefully when invalid sizes are requested', status: 'fail' }
  ]
};

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

let state = {
  mode: 'critique',
  focus: 'requirements',
  selectedExpert: 'karl-wiegers',
  view: 'experts' // 'experts' | 'session' | 'scoring'
};

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function render() {
  renderControls();
  renderSidebar();
  renderContent();
}

function renderControls() {
  const el = document.getElementById('controls');
  const modes = ['critique', 'discussion', 'socratic'];
  const focuses = Object.keys(FOCUS_AREAS);

  el.innerHTML = `
    <div class="control-group">
      <label>Mode</label>
      ${modes.map(m => `<button class="ctrl-btn ${state.mode === m ? 'active' : ''}" onclick="setMode('${m}')">${m}</button>`).join('')}
    </div>
    <div class="control-group">
      <label>Focus</label>
      ${focuses.map(f => `<button class="ctrl-btn ${state.focus === f ? 'active' : ''}" onclick="setFocus('${f}')">${f}</button>`).join('')}
    </div>
    <div class="control-group" style="margin-left:auto;">
      <label>View</label>
      <button class="ctrl-btn ${state.view === 'experts' ? 'active' : ''}" onclick="setView('experts')">Experts</button>
      <button class="ctrl-btn ${state.view === 'session' ? 'active' : ''}" onclick="setView('session')">Live Session</button>
      <button class="ctrl-btn ${state.view === 'scoring' ? 'active' : ''}" onclick="setView('scoring')">Scoring</button>
    </div>
  `;
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const focus = FOCUS_AREAS[state.focus];
  const activeExperts = focus.experts;
  const sortedKeys = Object.keys(EXPERTS).sort((a, b) => {
    const aActive = activeExperts.includes(a);
    const bActive = activeExperts.includes(b);
    if (aActive && !bActive) return -1;
    if (!aActive && bActive) return 1;
    return 0;
  });

  let html = `<div class="sidebar-title">Panel: ${focus.name} Focus (${activeExperts.length} experts)</div>`;

  sortedKeys.forEach(key => {
    const e = EXPERTS[key];
    const isActive = activeExperts.includes(key);
    const isLead = key === focus.lead;
    const isDefault = e.isDefault;
    const isAuto = e.autoKeywords && !isActive;

    let badge = '';
    if (isLead) badge = '<span class="expert-badge badge-lead">LEAD</span>';
    else if (isDefault && isActive) badge = '<span class="expert-badge badge-default">DEFAULT</span>';
    else if (isAuto) badge = '<span class="expert-badge badge-auto">AUTO</span>';

    html += `
      <div class="expert-card ${state.selectedExpert === key ? 'active' : ''} ${!isActive ? 'dimmed' : ''}" onclick="selectExpert('${key}')">

  });

  el.innerHTML = html;
}

}

function renderSessionView(el) {

}

function setMode(m) { state.mode = m; render(); }
function setFocus(f) {
  state.focus = f;
  const focusExperts = FOCUS_AREAS[f].experts;
  if (!focusExperts.includes(state.selectedExpert)) {
    state.selectedExpert = focusExperts[0];
  }
  render();
}
function setView(v) { state.view = v; render(); }
function selectExpert(key) { state.selectedExpert = key; render(); }
